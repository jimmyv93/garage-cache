name: Uppdatera parkeringsdata

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  fetch-garage-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4

      - name: Hämta garagedata från Stockholm Parkering
        run: |
          curl -s --max-time 120 \
            "https://api.stockholmparkering.se:8084/SparkInfartsParkeringService.svc/GetAllAnlaggningParkeringsInfo" \
            -o data/garagedata.json
          echo "Garagedata hämtad $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Hämta tillåten parkering (Trafikkontoret)
        run: |
          curl -s --max-time 60 \
            "https://openparking.stockholm.se/LTF-Tolken/v1/ptillaten/all?outputFormat=json&apiKey=${{ secrets.TRAFIKKONTORET_API_KEY }}" \
            -o data/ptillaten.json
          echo "ptillaten hämtad"

      - name: Hämta servicedagar (Trafikkontoret)
        run: |
          curl -s --max-time 60 \
            "https://openparking.stockholm.se/LTF-Tolken/v1/servicedagar/all?outputFormat=json&apiKey=${{ secrets.TRAFIKKONTORET_API_KEY }}" \
            -o data/servicedagar.json
          echo "servicedagar hämtad"

      - name: Hämta rörelsehindrade (Trafikkontoret)
        run: |
          curl -s --max-time 60 \
            "https://openparking.stockholm.se/LTF-Tolken/v1/prorelsehindrad/all?outputFormat=json&apiKey=${{ secrets.TRAFIKKONTORET_API_KEY }}" \
            -o data/prorelsehindrad.json
          echo "prorelsehindrad hämtad"

      - name: Uppdatera tidsstämpel
        run: |
          echo "{\"uppdaterad\": \"$(date -u '+%Y-%m-%dT%H:%M:%SZ')\"}" > data/meta.json

      - name: Committa och pusha
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Uppdatera parkeringsdata $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
