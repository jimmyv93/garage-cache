name: Uppdatera garagedata

on:
  schedule:
    - cron: '*/10 * * * *'  # Var 10:e minut
  workflow_dispatch:          # Tillåter manuell körning

jobs:
  fetch-garage-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4

      - name: Hämta data från Stockholm Parkering API
        run: |
          curl -s --max-time 30 \
            "https://api.stockholmparkering.se:8084/SparkInfartsParkeringService.svc/GetAllAnlaggningParkeringsInfo" \
            -o data/garagedata.json
          echo "Hämtad $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Spara tidsstämpel
        run: |
          echo "{\"uppdaterad\": \"$(date -u '+%Y-%m-%dT%H:%M:%SZ')\"}" > data/meta.json

      - name: Committa och pusha om data ändrats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Uppdatera garagedata $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
